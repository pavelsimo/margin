name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate version tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Require tag to match package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${package_version}" ]]; then
            echo "Tag $GITHUB_REF_NAME must match package.json version v${package_version}." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-latest
            platform: linux
            arch: x64
          - label: Windows x64
            os: windows-latest
            platform: win
            arch: x64
          - label: macOS Intel
            os: macos-15-intel
            platform: mac
            arch: x64
          - label: macOS Apple Silicon
            os: macos-15
            platform: mac
            arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installer
        run: npm run dist -- --${{ matrix.platform }} --${{ matrix.arch }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: margin-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* \
              --verify-tag \
              --title "Margin $GITHUB_REF_NAME" \
              --generate-notes
          fi
